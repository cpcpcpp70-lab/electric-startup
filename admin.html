<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 로그인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#0a2540;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:white;border-radius:20px;padding:2.5rem 2rem;width:320px;text-align:center;}
h1{font-size:17px;font-weight:700;color:#0a2540;margin-bottom:.3rem;}
p{font-size:13px;color:#94a3b8;margin-bottom:2rem;}
.dots{display:flex;justify-content:center;gap:12px;margin-bottom:2rem;}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid #e2e8f0;background:white;}
.dot.on{background:#0a2540;border-color:#0a2540;}
.dot.err{background:#ef4444;border-color:#ef4444;}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.key{background:#f8f9fb;border:1px solid #e8edf3;border-radius:12px;padding:16px;font-size:20px;font-weight:700;color:#0a2540;cursor:pointer;}
.key.del{font-size:13px;color:#64748b;}
.key.blank{background:transparent;border:none;cursor:default;}
.msg{font-size:13px;color:#ef4444;margin-top:1rem;min-height:20px;}
</style>
</head>
<body>
<div class="box">
  <h1>전기창업경영연구원</h1>
  <p>관리자 비밀번호 6자리 입력</p>
  <div class="dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
    <div class="dot" id="d5"></div>
  </div>
  <div class="keys">
    <button class="key" onclick="k('1')">1</button>
    <button class="key" onclick="k('2')">2</button>
    <button class="key" onclick="k('3')">3</button>
    <button class="key" onclick="k('4')">4</button>
    <button class="key" onclick="k('5')">5</button>
    <button class="key" onclick="k('6')">6</button>
    <button class="key" onclick="k('7')">7</button>
    <button class="key" onclick="k('8')">8</button>
    <button class="key" onclick="k('9')">9</button>
    <button class="key blank"></button>
    <button class="key" onclick="k('0')">0</button>
    <button class="key del" onclick="dl()">삭제</button>
  </div>
  <div class="msg" id="msg"></div>
</div>
<script>
var pw='',ok='527452';
function k(n){if(pw.length>=6)return;pw+=n;upd();if(pw.length===6)chk();}
function dl(){pw=pw.slice(0,-1);upd();document.getElementById('msg').textContent='';for(var i=0;i<6;i++)document.getElementById('d'+i).className='dot';}
function upd(){for(var i=0;i<6;i++){document.getElementById('d'+i).className='dot'+(i<pw.length?' on':'');}}
function chk(){
  if(pw===ok){localStorage.setItem('kemr_auth','yes');window.location.href='dashboard.html';}
  else{
    for(var i=0;i<6;i++)document.getElementById('d'+i).className='dot err';
    document.getElementById('msg').textContent='비밀번호가 틀렸습니다.';
    setTimeout(function(){pw='';upd();for(var i=0;i<6;i++)document.getElementById('d'+i).className='dot';document.getElementById('msg').textContent='';},1000);
  }
}
</script>
</body>
</html>
